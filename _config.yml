# About Section
about:
  heading: "We close the Integration Gap."
  text: >
    BORING SCIENCE is a computational biology platform solving precision
    medicine's hardest engineering problem — the gap between a computational
    hit and a clinical lead. We combine AlphaFold3-level all-atom structural
    prediction with Neural Network Potential-accelerated molecular dynamics,
    giving you not a snapshot of binding, but the full dynamic picture of
    how a drug actually performs.
  text2: >
    Our Unified Multiomics layer normalizes RNA, protein, and metabolite data
    across batch effects — eliminating the noise that turns false positives
    into wasted trials. Then we simulate drug performance against your
    patient's specific mutations, not a generic wild-type. The result:
    reproducible, regulatory-grade insights engineered to survive the clinic.

