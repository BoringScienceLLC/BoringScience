- title: "bsdock: An SE(3)-Equivariant Graph Neural Network Scoring Function for Molecular Docking"
  authors: "Panda PK, Jagadeesan SK, Mishra S"
  journal: "Preprint · Under Submission"
  year: "2025"
  status: "Preprint"
  area: "Computational Drug Discovery · Machine Learning · Molecular Docking"
  abstract: "Accurate prediction of protein-ligand binding affinity remains a central challenge in computational drug discovery. We present bsdock, a comprehensive molecular docking platform featuring a novel SE(3)-equivariant graph neural network scoring function. Protein-ligand complexes are encoded as heterogeneous graphs with physically grounded rotational and translational invariance enforced by construction. Trained on combined ULVSH (942 compounds) and PDBbind (5,316 complexes) datasets, bsdock achieves Pearson R = 0.88 on PDBbind and R = 0.82 on ULVSH, substantially outperforming AutoDock Vina, Gnina, and MM-GBSA. Activity classification yields AUC-ROC = 0.94. The platform integrates traditional pose generation with GNN rescoring in a hybrid workflow, with specialist modules for flexible, metal-coordinated, and tethered docking."
