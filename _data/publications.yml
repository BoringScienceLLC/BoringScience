- title: "Progenitor-associated cells in the adult human spinal cord exhibit state-dependent proliferative competence"
  authors: "Jagadeesan SK, Panda PK, Vimukthe R, Galuta A, Wang J, Tsai EC"
  journal: "Under Review"
  year: "2025"
  status: "Under Review"
  area: "Multiomics · Spatial Transcriptomics · Neural Biology"
  abstract: "Integrating anatomically targeted ex vivo assays, bulk RNA sequencing, and re-analysis of adult human single-nucleus and spatial transcriptomic datasets to define transcriptional states in adult human spinal cord central canal–associated cells. We show that progenitor-associated programs in intact tissue remain non-cycling and astrocyte-embedded, while proliferative and biosynthetic programs are unmasked under permissive ex vivo conditions — revealing a state-dependent rather than constitutive model of proliferative competence."
  tags:
    - "Bulk RNA-seq"
    - "snRNA-seq"
    - "Spatial Transcriptomics"
    - "Spinal Cord"
    - "Neural Progenitors"
    - "Multiomics"
  data_accession: "GEO: GSE309472"
  doi: ""

