- title: "Rebuilding Spinal Circuit Computation Through a Patient-Specific Interneuron Precision Model"
  authors: "Jagadeesan SK, Sandarage RV, Tsai EC"
  journal: "Preprints.org"
  year: "2025"
  status: "Preprint"
  area: "Computational Neuroscience · Spinal Cord Injury · Precision Medicine"
  abstract: "We reframe spinal repair as the reconstitution of circuit computation, synthesizing how embryonic patterning programs establish interneuron diversity, connectivity, and network symmetry encoding motor coordination. Spinal cord injury disrupts this logic, fragmenting excitatory-inhibitory balance and desynchronizing rhythmic modules, while residual circuits retain latent capacity for resynchronization. We propose the Patient Specific Interneuron Precision Model (PIPM), a closed-loop framework linking patient-specific biological states — progenitor competence, morphogen sensitivity, and metabolic tone — to circuit-level computation and recovery potential."
