- title: "Transcriptomic and Functional Landscape of Adult Human Spinal Cord NSPCs Compared to iPSC-Derived Neural Progenitor Cells"
  authors: "Jagadeesan SK, Galuta A, Sandarage RV, Tsai EC"
  journal: "Cells"
  year: "2025"
  status: "Published"
  area: "Transcriptomics · Neural Stem Cells · iPSC"
  abstract: "The first direct transcriptomic and functional comparison of syngeneic adult human NSPC populations — bona fide spinal cord NSPCs versus iPSC-derived NSPCs regionalized to the spinal cord (iPSC-SC) and forebrain (iPSC-Br). RNA sequencing revealed that iPSC-Br NSPCs closely resemble bona fide spinal cord NSPCs, with enriched neurogenesis, axon guidance, and synaptic signaling pathways, while iPSC-SC NSPCs showed significant heterogeneity and suboptimal regional specification. Donor-specific factors significantly modulated transcriptomic profiles, highlighting the impact of genetic and epigenetic individuality on NSPC behavior."
