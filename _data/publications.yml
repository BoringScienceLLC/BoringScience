- title: "bsvision: Physics-Constrained Diffusion Models for Temporally Consistent Medical Video Generation"
  authors: "Panda PK, Jagadeesan SK, Mishra S"
  journal: "Preprint · Under Submission"
  year: "2025"
  status: "Preprint"
  area: "Medical Computer Vision · Generative AI · Cardiac Imaging"
  abstract: "Generating physiologically coherent synthetic medical video remains an open challenge — standard video diffusion models optimize perceptual quality without enforcing the physics of biological motion. We present bsvision, a physics-constrained pixel-space video diffusion model for echocardiography generation. Our 3D UNet backbone with cross-frame attention at all encoder/decoder levels is conditioned on cardiac cycle embeddings to enforce temporally consistent dynamics. Through five model iterations we identify that cross-frame attention (+0.32 SSIM) and SSIM loss weight tuning (+0.32 SSIM) dominate performance, while physics-based losses provide regularization (+0.04 SSIM). The final model achieves SSIM = 0.87 between consecutive frames — a 6.2× improvement over baseline — and augmenting with 10k synthetic samples yields a 12.8% improvement in downstream ejection fraction prediction."
