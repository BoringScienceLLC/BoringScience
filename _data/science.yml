# ============================================================
# Science — Research areas. Edit to update.
# ============================================================

- area: "Spatial Genomics"
  title: "Spatial Multiome Architecture"
  description: "Mapping gene expression and chromatin accessibility in tissue space using Visium HD, MERSCOPE, and Xenium. We reconstruct tumor microenvironment architecture and cell-cell interaction networks at submicron resolution — going beyond counts to spatial context."
  tags:
    - "Visium HD"
    - "MERSCOPE"
    - "Xenium"
    - "SpatialDE"

- area: "Single-Cell & snRNA-seq"
  title: "Cross-Modal Single-Cell Resolution"
  description: "Integrated single-nucleus and single-cell RNA-seq analysis across tissue types — from UMAP clustering and cell state annotation to cross-species comparison and inter-donor variability quantification. We run snRNA-seq, bulk RNA-seq, and Visium spatial data through a single unified pipeline, delivering coherent cross-modal answers without batch artefacts."
  tags:
    - "snRNA-seq"
    - "scRNA-seq"
    - "Cell State Annotation"
    - "Cross-Modal Integration"
    - "Inter-donor Variability"

- area: "Biomolecular Structure"
  title: "End-to-End Co-Complex Structure Prediction"
  description: "Running AlphaFold3, Chai-1, and Boltz-2 pipelines for joint prediction of protein-ligand, protein-nucleic acid, and antibody-antigen co-complexes at scale. Confidence-calibrated structural ensembles feed directly into our docking and free-energy perturbation workflows — from sequence to binding-ready pose in a single reproducible run."
  tags:
    - "AlphaFold3"
    - "Chai-1"
    - "Boltz-2"
    - "Co-Complex Prediction"
    - "Free-Energy Perturbation"

- area: "Generative Protein Design"
  title: "De Novo Protein & Antibody Design"
  description: "Leveraging RFdiffusion, ProteinMPNN, and Chai-1 to design high-affinity binders from scratch. We integrate structural biology with generative AI to bypass traditional screening — designing therapeutic proteins, antibody CDR loops, and peptide drugs with programmable specificity and in-silico-validated binding geometry."
  tags:
    - "RFdiffusion"
    - "ProteinMPNN"
    - "Chai-1"
    - "De Novo Design"
    - "Antibody Engineering"

- area: "Molecular Scoring & Geometry"
  title: "SE(3)-Equivariant GNN Scoring Functions"
  description: "Building and fine-tuning SE(3)-equivariant Graph Neural Networks for structure-aware molecular scoring — docking pose ranking, binding affinity prediction, and protein-ligand interaction geometry. Integrated with computer vision models for 3D pocket feature extraction and ensemble scoring across conformational states."
  tags:
    - "SE(3)-GNN"
    - "Equivariant Networks"
    - "Computer Vision"
    - "Molecular Docking"
    - "Binding Affinity"

- area: "Drug Discovery AI"
  title: "End-to-End Drug Discovery Pipeline"
  description: "A full computational drug discovery stack — from target identification and hit discovery through lead optimization and ADMET prediction. Foundation models (ESM-3, ProtTrans, in-house architectures) combined with GNN scoring, generative design, and pharmacovigilance-linked safety profiling, all wrapped in reproducible, containerized pipelines."
  tags:
    - "ESM-3"
    - "Hit Discovery"
    - "Lead Optimization"
    - "ADMET"
    - "Safety Profiling"

- area: "Precision Pharmacogenomics"
  title: "Predictive Safety & ADR Modeling"
  description: "Integrating genomic variants with large-scale pharmacovigilance data to predict Adverse Drug Reactions before compounds enter trials. We build deep learning architectures that map the intersection of genetic markers and chemical toxicity — surface ADR signals from GWAS-linked data before Phase I."
  tags:
    - "ADR Prediction"
    - "GWAS Integration"
    - "Drug-Target Interaction"
    - "Safety Intelligence"

- area: "Multimodal Foundation Models"
  title: "Cross-Modal Genomic Representation Learning"
  description: "Pretraining and fine-tuning large biological foundation models — scFoundation, Geneformer, and in-house architectures — on paired transcriptomic, proteomic, and imaging datasets. Unified representations that generalize across cell types, tissues, and perturbation screens."
  tags:
    - "scFoundation"
    - "Geneformer"
    - "Perturbation Biology"
    - "Multi-Modal Learning"

- area: "Epigenomics"
  title: "Epigenomic Reprogramming Maps"
  description: "CUT&RUN, CUT&TAG, and scATAC profiling to map transcription factor binding dynamics, super-enhancer activation, and chromatin remodeling across oncogenic transformation and therapeutic response. Linking regulatory grammar to disease phenotype."
  tags:
    - "CUT&RUN"
    - "scATAC-seq"
    - "Super-Enhancers"
    - "TF Motifs"

- area: "Long-Read Genomics"
  title: "Full-Length Variant & Isoform Resolution"
  description: "PacBio Revio and Oxford Nanopore R10 workflows for phased structural variant calling, full-length transcript isoform quantification, and direct base modification detection. Closing the gaps left by short-read sequencing in complex genomic regions and repeat elements."
  tags:
    - "PacBio Revio"
    - "ONT R10"
    - "Structural Variants"
    - "Direct RNA Sequencing"
