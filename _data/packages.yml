- name: "bsfep"
  version: "0.1.0"
  status: "Trial"
  area: "Free Energy Perturbation Simulation"
  headline: "Alchemical FEP and thermodynamic integration for rigorous binding free energy prediction at lead optimization scale."
  description: "bsfep is Boring Science's free energy perturbation platform. It automates relative binding free energy (RBFE) and absolute binding free energy (ABFE) calculations using alchemical perturbation theory, with support for GROMACS and OpenMM backends. The workflow handles lambda window setup, Bennett Acceptance Ratio (BAR) and MBAR analysis, cycle closure correction, and uncertainty quantification. Designed for lead series where rank-ordering by docking score is insufficient — bsfep delivers thermodynamically rigorous ΔΔG predictions targeting sub-kcal/mol accuracy."
