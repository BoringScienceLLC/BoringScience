- name: "bsdock"
  version: "1.0.0"
  status: "Proprietary"
  area: "Molecular Docking"
  headline: "SE(3)-equivariant GNN scoring for molecular docking. Flexible receptor, allosteric site detection, ensemble docking. Pearson R: 0.88."
  description: "bsdock is Boring Science's computational docking platform, featuring a proprietary SE(3)-equivariant Graph Neural Network scoring function. Protein-ligand complexes are encoded as heterogeneous graphs with the SE(3)-equivariant architecture guaranteeing predictions invariant to rotations and translations — a physically grounded constraint that standard empirical scoring functions ignore. bsdock ships a hybrid workflow combining traditional pose generation with GNN rescoring, plus specialist modules for flexible receptor docking, allosteric site detection, and ensemble docking. Compatible with poses from any upstream docking engine."
  stats:
    - label: "PDBbind Pearson R"
      value: "0.88"
    - label: "Activity AUC-ROC"
      value: "0.94"
    - label: "vs. best classical scorer"
      value: "5.5×"
    - label: "Allosteric site detection"
      value: "✓"
  tags:
