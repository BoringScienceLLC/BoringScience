- name: "bsphmd"
  version: "0.1.0"
  status: "Beta"
  area: "Constant-pH Molecular Dynamics"
  headline: "pH-aware MD with continuous protonation state sampling — resolve pH-dependent binding and active site dynamics."
  description: "bsphmd is Boring Science's constant-pH molecular dynamics package. It enables explicit protonation state sampling during simulation using continuous constant-pH MD (CpHMD), capturing pH-dependent conformational dynamics that fixed-protonation simulations miss entirely. Titratable residues — His, Asp, Glu, Cys, Lys — are sampled at physiological or user-specified pH, with free energy profiles reporting per-residue pKa shifts in the binding context. Critical for targets with ionizable active sites, allosteric pH sensors, or compounds with titratable functional groups."
