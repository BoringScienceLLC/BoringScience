- name: "bscircuit"
  version: "1.0.0"
  status: "Proprietary"
  area: "Gene Regulatory Network Engine"
  headline: "From expression matrix to inferred GRN, Boolean attractors, and in-silico perturbation — gene circuit analysis end-to-end."
