- name: "bsvision"
  version: "0.5.0"
  status: "Proprietary"
  area: "Physics-Constrained Medical Video Generation"
  headline: "Temporally coherent synthetic medical video — 0.87 SSIM and 12.8% improvement in downstream clinical prediction."
  description: "bsvision is Boring Science's medical computer vision package for physics-constrained synthetic video generation. Built on a pixel-space 3D UNet with cross-frame attention at all encoder/decoder levels, it conditions generation on physiological cycle embeddings to enforce temporally consistent cardiac dynamics. Unlike standard video diffusion models that optimize for perceptual quality alone, bsvision enforces physics-based constraints — temporal smoothness, flow consistency, volume conservation, and jerk penalty — producing synthetic videos suitable for clinical AI training data augmentation, simulation, and counterfactual analysis. Validated on echocardiography with a 6.2× improvement in temporal consistency over baseline and a 12.8% gain in downstream ejection fraction prediction accuracy."
