- name: "bssentinel"
  version: "1.0.0"
  status: "Proprietary"
  area: "Patient Deterioration Risk Engine"
  headline: "Predict ICU transfer, ventilation, and in-hospital mortality 6–48 hours early. AUROC 0.758 vs NEWS2 0.568. Validated on 1.33M MIMIC-IV windows."
  description: "bssentinel is Boring Science's clinical early-warning system for patient deterioration. It combines the established NEWS2 physiological score with a temporal XGBoost model trained on 1,334,773 monitoring windows from 80,442 MIMIC-IV admissions, predicting ICU transfer, mechanical ventilation, and in-hospital mortality within a 6–48 hour horizon. AUROC 0.758 (95% CI 0.755–0.761) versus NEWS2 0.568 — a DeLong z-statistic of 80.3 (p < 0.0001). Missingness indicators for high-acuity labs such as lactate are encoded as informative features, not discarded. Every prediction ships with SHAP feature attribution so clinicians understand which vitals and labs drove the alert. Manuscript in preparation for Science Advances."
  stats:
    - label: "AUROC (XGBoost)"
      value: "0.758 (95% CI 0.755–0.761)"
    - label: "vs NEWS2 AUROC"
      value: "0.568 — DeLong z=80.3, p<0.0001"
    - label: "Training cohort"
      value: "1,334,773 windows · 80,442 admissions"
    - label: "Prediction horizon"
      value: "6–48 hours"
  tags:
    - "Clinical Decision Support"
    - "XGBoost"
