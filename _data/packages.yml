  headline: "Replica Exchange MD and simulated annealing for conformational space exploration — escape local minima systematically."
  description: "bsremd is Boring Science's enhanced sampling simulation package. It orchestrates Replica Exchange Molecular Dynamics (T-REMD) across temperature ladders and Hamiltonian REMD (H-REMD) across alchemical states, enabling efficient conformational space exploration for flexible proteins, intrinsically disordered regions, and peptides. Built-in simulated annealing protocols accelerate structure optimization and docking pose refinement. Automated exchange acceptance monitoring, replica overlap diagnostics, and Weighted Histogram Analysis (WHAM) for free energy surface reconstruction are included. Compatible with GROMACS, AMBER, and NAMD."
