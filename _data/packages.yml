- name: "bsview"
  version: "1.0.0"
  status: "Proprietary"
  area: "3D Molecular Visualization"
  headline: "Interactive 3D molecular visualization with binding affinity scoring, pocket detection, and interaction analysis."
  description: "bsview is Boring Science's browser-native molecular visualization platform. It renders protein structures and protein-ligand complexes from PDB input across three rendering modes — sticks, spheres, and molecular surfaces — with Vina-like binding affinity scoring and real-time interaction detection covering hydrogen bonds, hydrophobic contacts, π-stacking, and clash detection. Built-in binding pocket analysis and 2D ligand-protein interaction maps make it a complete structural analysis environment. No installation required — runs entirely in-browser via WebGL."
