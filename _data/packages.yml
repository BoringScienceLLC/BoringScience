- name: "bsdock"
  version: "1.0.0"
  status: "Proprietary"
  area: "Molecular Docking & GNN Scoring"
  headline: "SE(3)-equivariant GNN scoring that outperforms classical docking by 5.5× on binding affinity correlation."
  description: "bsdock is Boring Science's computational docking platform, featuring a proprietary SE(3)-equivariant Graph Neural Network scoring function. Protein-ligand complexes are encoded as heterogeneous graphs — separate node types for protein and ligand atoms — with the SE(3)-equivariant architecture guaranteeing predictions are invariant to rotations and translations, a physically grounded constraint that standard empirical scoring functions ignore. bsdock ships a hybrid workflow combining traditional pose generation with GNN rescoring, plus specialist modules for flexible receptor docking, metal coordination, and tethered docking. Compatible with poses from any upstream docking engine."
